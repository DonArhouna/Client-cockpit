site_name: Cockpit — Documentation Client
site_description: Documentation officielle de l'application client-cockpit
site_author: Équipe Cockpit
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Cartographie: cartographie.md

  - Démarrage rapide:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md

  - Architecture:
    - architecture/index.md
    - Vue d'ensemble: architecture/overview.md
    - Routage & Guards: architecture/routing.md
    - Gestion d'état: architecture/state-management.md

  - Pages & Modules:
    - pages/index.md
    - Dashboard: pages/dashboard.md
    - Trésorerie: pages/finance.md
    - Ventes: pages/sales.md
    - Achats: pages/purchases.md
    - Stocks: pages/stocks.md
    - Comptabilité: pages/accounting.md
    - Risques: pages/risks.md
    - Requêtes IA: pages/smart-queries.md

  - Composants:
    - components/index.md
    - Composants partagés: components/shared.md
    - Dashboard Grid: components/dashboard-grid.md

  - Guide de développement:
    - development/index.md
    - Guide complet: development/guide.md
    - Conventions de code: development/conventions.md
    - Ajouter une page: development/adding-page.md

  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DonArhouna/Cockpit-client

copyright: "© 2026 Cockpit — InsightSage. Tous droits réservés."
